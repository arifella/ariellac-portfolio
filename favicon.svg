<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <clipPath id="clipY"><circle cx="32" cy="20.45" r="20"/></clipPath>
    <clipPath id="clipR"><circle cx="22" cy="37.77" r="20"/></clipPath>
    <clipPath id="clipB"><circle cx="42" cy="37.77" r="20"/></clipPath>
  </defs>

  <!-- solo circles -->
  <circle cx="32" cy="20.45" r="20" fill="#F7D117"/>
  <circle cx="22" cy="37.77" r="20" fill="#E8231F"/>
  <circle cx="42" cy="37.77" r="20" fill="#1E3A93"/>

  <!-- pairwise overlaps -->
  <g clip-path="url(#clipY)">
    <g clip-path="url(#clipR)">
      <rect x="0" y="0" width="64" height="64" fill="#F2801E"/>
    </g>
  </g>
  <g clip-path="url(#clipY)">
    <g clip-path="url(#clipB)">
      <rect x="0" y="0" width="64" height="64" fill="#1E7A3C"/>
    </g>
  </g>
  <g clip-path="url(#clipR)">
    <g clip-path="url(#clipB)">
      <rect x="0" y="0" width="64" height="64" fill="#7A2E9E"/>
    </g>
  </g>

  <!-- triple overlap -->
  <g clip-path="url(#clipY)">
    <g clip-path="url(#clipR)">
      <g clip-path="url(#clipB)">
        <rect x="0" y="0" width="64" height="64" fill="#241E1B"/>
      </g>
    </g>
  </g>
</svg>
